name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      VITE_AGENT_SERVICE_URL: https://spacetraders.radomskyi.com/api/agent/v1
      VITE_NAVIGATION_SERVICE_URL: https://spacetraders.radomskyi.com/api/navigation/v1
      VITE_FLEET_SERVICE_URL: https://spacetraders.radomskyi.com/api/fleet/v1
      VITE_AUTOMATION_SERVICE_URL: https://spacetraders.radomskyi.com/api/automation/v1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::543292785457:role/command-interface-deploy
          aws-region: eu-central-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://spacetraders-radomskyi-com --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
